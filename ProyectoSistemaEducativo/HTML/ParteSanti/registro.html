<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | EduAmbiente</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100 fondo">
    <header class="navbar navbar-dark fw-bold bg-success">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="MDashboard.html">
      EduAmbiente
    </a>
  </div>
</header>
<main class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="card" style="width: 30rem;">
        <div class="card-body">
            <h5 class="card-title">Registro</h5>
            <div id="mensaje" class="alert d-none mb-3"></div>
            <form id="formRegister" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input id="username" name="username" type="text" class="form-control" placeholder="Tu usuario" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="Aa@1234567" required>
                </div>

                <button type="submit" class="btn btn-success">Registrarse</button>
                <a href="MDashboard.html" class="btn btn-success">Registrarse con Google</a>
            </form>

        </div>
    </div>
</main>
<footer class="bg-success text-white text-center p-3 mt-auto">
© 2026 EduAmbiente | Universidad Fidelitas | Cliente Servidor Web | Grupo 1
</footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

</html>
